name: Generate beIN MENA AR EPG (7 days)

on:
  schedule:
    - cron: "0 */6 * * *"  # كل 6 ساعات
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repo
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies + tsx
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install tsx -g

      # --------------------------
      # Grab beIN MENA AR EPG for 7 days
      # --------------------------
      - name: Grab beIN MENA AR EPG
        run: |
          cd epg
          tsx scripts/commands/epg/grab.ts ./sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --output guide_bein.xml --days 7

      # --------------------------
      # Upload guide.xml as artifact
      # --------------------------
      - name: Upload guide as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bein-mena-ar-epg
          path: epg/guide_bein.xml

      # --------------------------
      # Commit & push to repo
      # --------------------------
      - name: Commit & Push
        run: |
          cd epg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guide_bein.xml
          git commit -m "Update beIN MENA AR EPG 7 days [skip ci]" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
