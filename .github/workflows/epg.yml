name: Generate beIN MENA AR EPG (7 days)

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein_mena_ar:
    runs-on: ubuntu-latest

    steps:
      # --------------------------
      # Checkout repository
      # --------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------
      # Setup Node.js (latest stable)
      # --------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      # --------------------------
      # Clone iptv-org/epg repository
      # --------------------------
      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      # --------------------------
      # Install dependencies
      # --------------------------
      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install xml2js

      # --------------------------
      # Grab beIN MENA AR EPG
      # --------------------------
      - name: Grab beIN MENA AR EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --output=guide_bein.xml \
            --days=7

      # --------------------------
      # Add channel names and logos
      # --------------------------
      - name: Add channel logos
        run: |
          cd epg
          node <<'EOF'
          const fs = require('fs');
          const xml = require('xml2js');

          const logos = {
            "beINSportsAFC1.qa@SD": "https://upload.wikimedia.org/wikipedia/commons/6/6c/1-HD.png",
            "beINSports2.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/5/51/2-HD.png",
            "beINSports3.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/f/fe/3-HD.png",
            "beINSports4.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/d/d1/4-HD.png",
            "beINSports5.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/f/f5/5-HD.png",
            "beINSports6.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/1/1d/6-HD.png",
            "beINSports7.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/2/27/7-HD.png",
            "beINSports8.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/c/cf/8-HD.png",
            "beINSports9.qa@MENA": "https://upload.wikimedia.org/wikipedia/commons/2/2f/9-HD.png"
          };

          const file = 'guide_bein.xml';
          const data = fs.readFileSync(file, 'utf-8');
          xml.parseString(data, (err, result) => {
            if (err) throw err;
            result.tv.channel.forEach(ch => {
              const id = ch.$.id;
              if (logos[id]) {
                ch.icon = [{ $: { src: logos[id] } }];
              }
            });
            const builder = new xml.Builder();
            fs.writeFileSync(file, builder.buildObject(result));
          });
          EOF

      # --------------------------
      # Save output
      # --------------------------
      - name: Save EPG
        run: |
          mkdir -p public
          cp epg/guide_bein.xml public/epg-bein-mena-ar.xml

      # --------------------------
      # Commit & push
      # --------------------------
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/epg-bein-mena-ar.xml
          git diff-index --quiet HEAD || git commit -m "Update beIN MENA AR EPG with logos"
          git pull --rebase origin main
          git push origin main
