name: Generate beIN EPG

on:
  schedule:
    - cron: "0 */6 * * *"  # كل 6 ساعات
  workflow_dispatch:
  push:
    paths:
      - 'epg_mapped.xml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run fetch script
      run: bash fetch_bein_epg.sh

    - name: Add country codes and French logos
      run: |
        python - <<'EOF'
        import xml.etree.ElementTree as ET

        tree = ET.parse('epg_mapped.xml')
        root = tree.getroot()

        # اختصارات الدول
        country_map = {
            'Australia': 'Aus',
            'France': 'Fr',
            'USA': 'USA',
            'qa': 'QA',
            'us': 'US',
            'fr': 'FR',
            'Malaysia': 'MY',
            'MENA': 'MENA'
        }

        # روابط لوغوهاتك الخاصة للقنوات الفرنسية
        french_logos = {
            "beINSports1.qa@France": "https://github.com/ayoubboukous27/beIN-Sports-EPG-Worldwide/raw/refs/heads/main/Logos/bein-sports-1-programme-chaine-93.png",
            "beINSports2.qa@France": "https://github.com/ayoubboukous27/beIN-Sports-EPG-Worldwide/raw/refs/heads/main/Logos/bein-sports-2-programme-chaine-15.png",
            "beINSports3.qa@France": "https://github.com/ayoubboukous27/beIN-Sports-EPG-Worldwide/raw/refs/heads/main/Logos/bein-sports-3-programme-chaine-118.png"
        }

        for channel in root.findall('channel'):
            display = channel.find('display-name')
            channel_id = channel.attrib.get('id', '')
            
            # إضافة اختصار الدولة
            if display is not None:
                if '@' in channel_id:
                    country_code = channel_id.split('@')[-1]
                else:
                    country_code = channel_id.split('.')[-1]
                country_short = country_map.get(country_code, country_code)
                display.text = f"{display.text.strip()} ({country_short})"
            
            # استبدال لوغو القنوات الفرنسية فقط
            if channel_id in french_logos:
                icon = channel.find('icon')
                if icon is not None:
                    icon.set('src', french_logos[channel_id])
                else:
                    ET.SubElement(channel, 'icon', {'src': french_logos[channel_id]})

        tree.write('epg_mapped_with_logos.xml', encoding='utf-8', xml_declaration=True)
        EOF

    - name: Upload result as artifact
      uses: actions/upload-artifact@v4
      with:
        name: bein-epg
        path: epg_mapped_with_logos.xml

    - name: Push updated EPG to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add epg_mapped_with_logos.xml
        git commit -m "Update EPG with French logos and country codes [skip ci]" || echo "No changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
