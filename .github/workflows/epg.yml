name: Generate Combined beIN EPG (7 days)

on:
  schedule:
    - cron: "0 5 * * *"  # يوميًا الساعة 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  grab_bein:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "node"

      - name: Clone iptv-org/epg
        run: |
          if [ ! -d "epg" ]; then
            git clone --depth 1 https://github.com/iptv-org/epg.git
          else
            git -C epg pull
          fi

      - name: Install dependencies
        run: |
          cd epg
          npm install
          npm install xml2js

      # Grab MENA AR
      - name: Grab beIN MENA AR EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/beinsports.com/beinsports.com_mena-ar.channels.xml \
            --output=guide_bein_mena_ar.xml \
            --days=7

      # Grab FR-FR
      - name: Grab beIN FR-FR EPG
        run: |
          cd epg
          npx tsx scripts/commands/epg/grab.ts \
            --channels=sites/beinsports.com/beinsports.com_fr-fr.channels.xml \
            --output=guide_bein_fr.xml \
            --days=7

      # Merge both and add Arabic logos
      - name: Merge EPGs and add logos
        run: |
          cd epg
          node <<'EOF'
          const fs = require('fs');
          const xml2js = require('xml2js');

          const files = ['guide_bein_mena_ar.xml', 'guide_bein_fr.xml'];
          const logos_ar = {
            "7836FEA9-6B39-4A1A-8352-DC5FCB97A16C": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-1-mea.png",
            "beINSports2.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-2-mea.png",
            "beINSports3.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-3-mea.png",
            "beINSports4.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-4-mea.png",
            "beINSports5.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-5-mea.png",
            "beINSports6.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-6-mea.png",
            "beINSports7.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-7-mea.png",
            "beINSports8.qa@MENA": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-8-mea.png",
            "5C08D9D3-C713-4F1F-947E-87C761428B9B": "https://github.com/tv-logo/tv-logos/raw/refs/heads/main/countries/world-middle-east/bein-sports/bein-sports-9-mea.png"
          };

          const parser = new xml2js.Parser();
          const builder = new xml2js.Builder({ headless: false, xmldec: { version: '1.0', encoding: 'UTF-8' } });

          let merged = { tv: { $: {}, channel: [], programme: [] } };

          files.forEach(file => {
            const data = fs.readFileSync(file, 'utf-8');
            parser.parseString(data, (err, result) => {
              if (err) throw err;

              // Add Arabic logos if channel exists
              result.tv.channel.forEach(ch => {
                const id = ch.$.id;
                if (logos_ar[id]) {
                  ch.icon = [{ $: { src: logos_ar[id] } }];
                }
              });

              // Merge channels and programmes
              merged.tv.channel.push(...result.tv.channel);
              if (result.tv.programme) merged.tv.programme.push(...result.tv.programme);
            });
          });

          fs.writeFileSync('../epg_mapped_with_logos.xml', builder.buildObject(merged), 'utf-8');
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add epg_mapped_with_logos.xml
          git diff-index --quiet HEAD || git commit -m "Update combined beIN EPG (MENA AR + FR-FR) with logos"
          git pull --rebase origin main
          git push origin main
